name: Monitor MIBGAS Alfaenergia

on:
  schedule:
    # Corre de 15 em 15 minutos entre as 17:00 UTC e as 19:00 UTC (18h às 20h em Portugal)
    - cron: '*/15 17,18 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: # Mantém o botão ativo para testares à mão!

permissions:
  contents: write  # Dá permissão explícita de escrita ao token nativo

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o Código para o Servidor
      uses: actions/checkout@v4
      with:
        # Mantém as credenciais ativas para os passos seguintes usarem automaticamente
        persist-credentials: true

    - name: Configurar o Python no Servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências necessárias
      run: pip install requests

    - name: Executar o Script Automatizado
      env:
        TEU_EMAIL: ${{ secrets.TEU_EMAIL }}
        TUA_SENHA_APP: ${{ secrets.TUA_SENHA_APP }}
      run: python alfaprojeto.py

    - name: Guardar Histórico Atualizado na Nuvem
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Faz o pull preventivo de forma segura usando a credencial persistida
        git pull origin main --rebase

        # Verifica se o ficheiro existe e se houve alterações reais
        if [ -f historico_precos.json ]; then
          git add historico_precos.json
          if ! git diff --cached --quiet; then
            git commit -m "💾 Estado de preços atualizado [Bot]"
            git push origin main
          else
            echo "Nenhuma alteração detetada no ficheiro historico_precos.json."
          fi
        else
          echo "Ficheiro historico_precos.json não foi encontrado."
        fi
