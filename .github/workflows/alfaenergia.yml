name: Monitor MIBGAS Alfaenergia

on:
  schedule:
    # Corre de 15 em 15 minutos entre as 17:00 UTC e as 19:00 UTC (18h às 20h em Portugal)
    - cron: '*/15 17,18 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch: # Mantém o botão ativo para testares à mão!

permissions:
  contents: write  # Dá permissão obrigatória de escrita ao token

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o Código para o Servidor
      uses: actions/checkout@v4

    - name: Configurar o Python no Servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências necessárias
      run: pip install requests

    - name: Executar o Script Automatizado
      env:
        TEU_EMAIL: ${{ secrets.TEU_EMAIL }}
        TUA_SENHA_APP: ${{ secrets.TUA_SENHA_APP }}
      run: python alfaprojeto.py

    # PASSO CORRIGIDO: Substitui os comandos manuais do Git por esta ferramenta oficial anti-bloqueio
    - name: Guardar Histórico Atualizado na Nuvem
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "💾 Estado de preços atualizado [Bot]"
        file_pattern: 'historico_precos.json'
