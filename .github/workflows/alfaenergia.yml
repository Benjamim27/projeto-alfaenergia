name: Monitor MIBGAS Alfaenergia

on:
  schedule:
    # Executa a cada 5 minutos entre as 17:30 e as 18:30 UTC
    # (Equivale às 18:30 até às 19:30 em Portugal Continental)
    - cron: '30-59 17 * * *'  # Corre de 5 em 5 min das 17:30 às 17:59 UTC
    - cron: '0-30/5 18 * * *' # Corre de 5 em 5 min das 18:00 às 18:30 UTC
  workflow_dispatch: # Mantém o botão para testares à mão!

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar o Código para o Servidor
      uses: actions/checkout@v4
      with:
        # ISTO É O QUE FALTA: Dá permissão real para o robô alterar arquivos
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar o Python no Servidor
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependências necessárias
      run: pip install requests

    - name: Executar o Script Automatizado
      env:
        TEU_EMAIL: ${{ secrets.TEU_EMAIL }}
        TUA_SENHA_APP: ${{ secrets.TUA_SENHA_APP }}
      run: python alfaprojeto.py

    - name: Guardar Histórico Atualizado na Nuvem
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Garante que puxamos qualquer micro-alteração antes do push para não dar erro
        git pull origin main --rebase

        if [ -f historico_precos.json ]; then
          git add historico_precos.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "💾 Estado de preços atualizado [Bot]" && git push origin main)
        fi